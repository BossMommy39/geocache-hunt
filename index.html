<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hunt</title>

<style>
body {
  background:#0a0a0a;
  color:#c8c8c8;
  font-family:Courier New, monospace;
  padding:20px;
}
button,input {
  background:#111;
  border:1px solid #333;
  color:#c8c8c8;
  padding:10px;
}
</style>

</head>

<body>
<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<script>
const e = React.createElement;
const {useState,useEffect,useRef} = React;

const SK = "hunt_v1";

function save(s){localStorage.setItem(SK,JSON.stringify(s))}
function load(){try{return JSON.parse(localStorage.getItem(SK))}catch{return null}}

function App(){

  const saved = load();

  const [lines,setLines] = useState(saved?.lines||[]);
  const [found,setFound] = useState(saved?.found||[]);
  const [solved,setSolved] = useState(saved?.solved||[]);
  const [cur,setCur] = useState(null);
  const [input,setInput] = useState("");
  const [typing,setTyping] = useState(false);

  const lockScroll = useRef(false);
  const bottomRef = useRef(null);

  function type(arr,cb,mode){
    let i=0;
    setTyping(true);

    function next(){
      if(i<arr.length){
        setLines(p=>[...p,arr[i]]);
        let delay = mode==="result" ? 900 : 350;
        i++;
        setTimeout(next,delay);
      } else {
        setTyping(false);
        if(cb) cb();
      }
    }
    next();
  }

  useEffect(()=>{
    save({lines,found,solved});
  },[lines,found,solved]);

  useEffect(()=>{
    if(!bottomRef.current || lockScroll.current) return;
    bottomRef.current.scrollIntoView({behavior:"auto"});
  },[lines]);

  // INIT
  useEffect(()=>{
    if(lines.length===0){
      type([
        "...",
        "oh.",
        "you found it.",
        "good.",
        "there are six objects.",
        "one of you is about to take this too seriously.",
        "i'm watching for that.",
        "go."
      ]);
    }
  },[]);

  function select(id){

    // SECRET
    if(solved.includes(id)){
      if(!window.secret){
        window.secret=true;
        lockScroll.current=true;

        setLines([]);
        type([
          "...",
          "you came back.",
          "most people don't.",
          "...",
          "don't lose that."
        ],()=>{
          lockScroll.current=false;
        },"result");

        return;
      } else {
        setLines([]);
        type(["you already broke it once."],()=>{}, "result");
        return;
      }
    }

    setCur(id);
    setLines([]);
    type(["question: what animal poops cubes"]);
  }

  function submit(){
    if(!cur) return;

    lockScroll.current=true;

    if(input.toLowerCase().includes("wombat")){
      setSolved(p=>[...p,cur]);

      type([
        "wombats.",
        "perfect cubes.",
        "you picked that up and learned this.",
        "...that's your legacy."
      ],()=>{
        lockScroll.current=false;
        setCur(null);
      },"result");

    } else {
      type(["no.","try again."],()=>{
        lockScroll.current=false;
      });
    }

    setInput("");
  }

  return e("div",{},
    lines.map((l,i)=>e("div",{key:i},l)),
    typing ? e("div",{},"_") : null,

    cur && !typing && e("div",{},
      e("input",{value:input,onChange:e=>setInput(e.target.value)}),
      e("button",{onClick:submit},"submit")
    ),

    e("div",{style:{marginTop:"20px"}},
      ["rock","frog","spider","poop","mushroom","pinecone"].map(id=>
        e("button",{key:id,onClick:()=>select(id)},id)
      )
    ),

    e("div",{ref:bottomRef})
  );
}

ReactDOM.render(e(App),document.getElementById("root"));
</script>

</body>
</html>
