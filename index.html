<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Hunt</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#c8c8c8;font-family:Courier New,monospace;padding:20px}
button,input{background:#111;border:1px solid #333;color:#c8c8c8;padding:10px;margin:4px}
</style>

</head>

<body>
<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<script>
(function(){

const {useState,useEffect,useRef} = React;
const e = React.createElement;

// ✅ FIX 1: persistent storage (no NFC reset)
const KEY="gch_v3";

function save(s){
  try{localStorage.setItem(KEY,JSON.stringify(s))}catch{}
}

function load(){
  try{
    const r=localStorage.getItem(KEY);
    return r?JSON.parse(r):null;
  }catch{return null}
}

function clear(){
  try{localStorage.removeItem(KEY)}catch{}
}

function App(){

  const saved = load();

  const [lines,setLines]=useState(saved?.lines||[]);
  const [solved,setSolved]=useState(saved?.solved||[]);
  const [cur,setCur]=useState(null);
  const [input,setInput]=useState("");
  const [typing,setTyping]=useState(false);

  // ✅ scroll lock
  const lockScroll=useRef(false);
  const bottom=useRef(null);

  useEffect(()=>{
    if(lines.length>0){
      save({lines,solved});
    }
  },[lines,solved]);

  // ✅ FIX 2: safe scroll
  useEffect(()=>{
    if(lockScroll.current) return;
    bottom.current?.scrollIntoView({behavior:"auto"});
  },[lines.length]);

  function type(arr,cb,mode){
    let i=0;
    setTyping(true);

    function next(){
      if(i<arr.length){
        setLines(p=>[...p,arr[i]]);
        i++;

        // ✅ FIX 3: better pacing
        let delay = mode==="result"
          ? 900
          : (arr[i-1]==="..." ? 600 : arr[i-1].length<12 ? 300 : 500);

        setTimeout(next,delay);

      } else {
        setTyping(false);
        if(cb) cb();
      }
    }
    next();
  }

  // INIT
  useEffect(()=>{
    if(lines.length===0){
      type([
        "...",
        "oh.",
        "you found it.",
        "good.",
        "there are six objects.",
        "one of you is about to take this too seriously.",
        "i'm watching for that.",
        "go."
      ]);
    }
  },[]);

  function select(id){

    // secret interaction
    if(solved.includes(id)){
      lockScroll.current=true;
      setLines([]);

      type([
        "...",
        "you came back.",
        "most people don't.",
        "...",
        "don't lose that."
      ],()=>{
        lockScroll.current=false;
      },"result");

      return;
    }

    setCur(id);
    setLines([]);

    type([
      "question:",
      "what animal poops cubes"
    ]);
  }

  function submit(){

    if(!cur) return;

    lockScroll.current=true;

    const answer=input.toLowerCase();

    if(answer.includes("wombat")){

      setSolved(p=>[...p,cur]);
      setCur(null);

      type([
        "wombats.",
        "perfect cubes.",
        "you picked that up and learned this.",
        "...that's your legacy."
      ],()=>{
        lockScroll.current=false;
      },"result");

    } else {

      type([
        "no.",
        "try again."
      ],()=>{
        lockScroll.current=false;
      });
    }

    setInput("");
  }

  return e("div",{},
    lines.map((l,i)=>e("div",{key:i},l)),

    typing && e("div",{},"_"),

    cur && !typing && e("div",{},
      e("input",{
        value:input,
        onChange:e=>setInput(e.target.value)
      }),
      e("button",{onClick:submit},"submit")
    ),

    e("div",{style:{marginTop:"20px"}},
      ["rock","frog","spider","poop","mushroom","pinecone"].map(id=>
        e("button",{key:id,onClick:()=>select(id)},id)
      )
    ),

    e("div",{ref:bottom})
  );
}

ReactDOM.render(e(App),document.getElementById("root"));

})();
</script>

</body>
</html>
