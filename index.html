<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hunt</title>

<style>
body {
  background:#0a0a0a;
  color:#c8c8c8;
  font-family:Courier New, monospace;
  padding:20px;
}
button,input {
  background:#111;
  border:1px solid #333;
  color:#c8c8c8;
  padding:10px;
  margin:4px;
}
</style>

</head>

<body>
<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<script>
const {useState,useEffect,useRef} = React;
const e = React.createElement;

const KEY = "hunt_state";

// SAFE LOAD
function load(){
  try{
    const data = localStorage.getItem(KEY);
    return data ? JSON.parse(data) : null;
  }catch{
    return null;
  }
}

// SAFE SAVE
function save(state){
  try{
    localStorage.setItem(KEY, JSON.stringify(state));
  }catch{}
}

function App(){

  // ✅ SAFE INITIAL STATE (CRITICAL FIX)
  const [state,setState] = useState(()=>{
    const saved = load();
    return saved || {
      lines: [],
      found: [],
      solved: [],
      cur: null,
      started: false
    };
  });

  const [input,setInput] = useState("");
  const [typing,setTyping] = useState(false);

  const lockScroll = useRef(false);
  const bottomRef = useRef(null);

  // SAVE ONLY WHEN VALID
  useEffect(()=>{
    if(!state.started) return;
    save(state);
  },[state]);

  // SCROLL (SAFE)
  useEffect(()=>{
    if(lockScroll.current) return;
    bottomRef.current?.scrollIntoView({behavior:"auto"});
  },[state.lines.length]);

  function type(lines,cb,mode){
    let i=0;
    setTyping(true);

    function next(){
      if(i < lines.length){
        setState(s=>({...s, lines:[...s.lines, lines[i]]}));
        i++;
        setTimeout(next, mode==="result" ? 900 : 350);
      } else {
        setTyping(false);
        if(cb) cb();
      }
    }
    next();
  }

  // INIT (ONLY ONCE, NO RESET BUG)
  useEffect(()=>{
    if(state.started) return;

    type([
      "...",
      "oh.",
      "you found it.",
      "good.",
      "there are six objects.",
      "one of you is about to take this too seriously.",
      "i'm watching for that.",
      "go."
    ],()=>{
      setState(s=>({...s, started:true}));
    });

  },[]);

  function select(id){

    // SECRET (SAFE)
    if(state.solved.includes(id)){
      lockScroll.current = true;

      setState(s=>({...s, lines:[]}));

      type([
        "...",
        "you came back.",
        "most people don't.",
        "...",
        "don't lose that."
      ],()=>{
        lockScroll.current = false;
      },"result");

      return;
    }

    setState(s=>({
      ...s,
      cur:id,
      lines:[]
    }));

    type([
      "question:",
      "what animal poops cubes"
    ]);
  }

  function submit(){

    if(!state.cur) return;

    lockScroll.current = true;

    if(input.toLowerCase().includes("wombat")){

      setState(s=>({
        ...s,
        solved:[...s.solved, s.cur],
        cur:null
      }));

      type([
        "wombats.",
        "perfect cubes.",
        "you picked that up and learned this.",
        "...that's your legacy."
      ],()=>{
        lockScroll.current = false;
      },"result");

    } else {

      type([
        "no.",
        "try again."
      ],()=>{
        lockScroll.current = false;
      });
    }

    setInput("");
  }

  return e("div",{},
    state.lines.map((l,i)=>e("div",{key:i},l)),

    typing && e("div",{},"_"),

    state.cur && !typing && e("div",{},
      e("input",{
        value:input,
        onChange:e=>setInput(e.target.value)
      }),
      e("button",{onClick:submit},"submit")
    ),

    e("div",{style:{marginTop:"20px"}},
      ["rock","frog","spider","poop","mushroom","pinecone"].map(id=>
        e("button",{key:id,onClick:()=>select(id)},id)
      )
    ),

    e("div",{ref:bottomRef})
  );
}

ReactDOM.render(e(App),document.getElementById("root"));
</script>

</body>
</html>
