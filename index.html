        for (var i = 0; i < big.length; i++) { if (l.indexOf(big[i]) !== -1) return ["no. you're thinking like someone who watches nature documentaries.","the real answer is something you've ignored near every pond you've ever been to."]; }

};

var INTRO = ["oh.","you found it.","...that wasn't supposed to happen yet.","okay. okay. fine.","so here's the situation. there are six objects hidden in this yard that belong to me.","they're not easter eggs. don't call them easter eggs.","i need them back.","each one has a tag on it. when you find one, tap it like you tapped this one.","i'll know which one you found. and i'll need you to do something for me before we move on.","think of it as... proof that you're paying attention.","find all six. do what i ask. and i'll make it worth your time.","...go."];
var CLOTHES = ["this isn't part of the game. i just want to know.","which one of you has gone the longest without changing clothes. don't answer. just look at each other.","...that was fast. and unanimous. wow."];
var COMPLETE = {
  noHints: ["...","you did all six.","without asking for help.","i don't \u2014 that doesn't happen. people always ask.","okay. i underestimated you. that's not easy for me to say.","go find the person who sent you out here. they have something for you.","you earned it. don't make it weird."],
  someHints: ["...","all six. done.","you needed a little help. that's fine. asking for help is actually \u2014","no. i'm not going to give you a life lesson. you did the thing.","go find the person who sent you out here. they have something for you.","go get it before i change my mind."],
  manyHints: ["...","technically, you finished.","with... a lot of help. from me. which i provided. generously.","look, the point isn't how you got here. the point is you kept going.","go find the person who sent you out here. they have something for you.","you're welcome."]
};
var QUIPS = {
  2:["two down. you're either fast or lucky.","i haven't decided which yet."],
  3:["halfway.","you're actually doing this."],
  4:["four. two left.","you're more persistent than i expected. that's not an insult. probably."],
  5:["one more.","i'm... almost going to miss this.","almost."]
};
var WRONGROCK = [
  ["...that's a rock. it's not the right rock. but you tried."],
  ["another rock. still wrong. you're very committed to this."],
  ["at this point you're just picking up rocks as a hobby. which \u2014 honestly, respect."],
  ["still wrong. there are a finite number of rocks out here. you'll get there."]
];

// --- IDLE LINES: the entity is alive between scans ---
var IDLE_EARLY = [
  "still looking.",
  "take your time. i'm not going anywhere. literally.",
  "you're walking in a pattern. i don't think you know that.",
  "...interesting strategy.",
  "i can see all of them from here. just so you know."
];
var IDLE_MID = [
  "you've walked past one twice now.",
  "i'm not going to tell you which direction to look. but i will say... down.",
  "one of them is closer than you think. one of them isn't.",
  "the obvious spots are obvious for a reason.",
  "you're overthinking this. or underthinking it. hard to tell."
];
var IDLE_LATE = [
  "at this point i'm invested.",
  "you know they're not going to move, right. they're objects.",
  "i believe in you. don't make me regret saying that.",
  "look where you haven't looked. that's free advice. you're welcome.",
  "...are you just enjoying the walk? because that's fine too. i guess."
];

var RETURN_LINES = ["you're back.","where were we. right."];
var geocacheKeys = Object.keys(GEOCACHES);

// --- SCANNER COMPONENT ---
function Scanner(props) {
  var remaining = props.remaining;
  return e("div", {
    style: {
      position: "relative",
      width: "120px",
      height: "120px",
      margin: "30px auto 10px auto"
    }
  },
    // Pulse rings
    e("div", { style: { position: "absolute", top: 0, left: 0, right: 0, bottom: 0, borderRadius: "50%", border: "1px solid #1a1a1a", animation: "scanPulse 3s ease-out infinite" }}),
    e("div", { style: { position: "absolute", top: 0, left: 0, right: 0, bottom: 0, borderRadius: "50%", border: "1px solid #1a1a1a", animation: "scanPulse 3s ease-out 1s infinite" }}),
    e("div", { style: { position: "absolute", top: 0, left: 0, right: 0, bottom: 0, borderRadius: "50%", border: "1px solid #1a1a1a", animation: "scanPulse 3s ease-out 2s infinite" }}),
    // Rotating ring
    e("div", { style: { position: "absolute", top: "15px", left: "15px", right: "15px", bottom: "15px", borderRadius: "50%", border: "1px dashed #222", animation: "scanRotate 12s linear infinite" }}),
    // Center
    e("div", { style: { position: "absolute", top: "50%", left: "50%", transform: "translate(-50%, -50%)", textAlign: "center" }},
      e("div", { style: { fontSize: "22px", color: "#c8c8c8", fontFamily: "'Courier New', monospace", fontWeight: "bold", lineHeight: "1" } }, remaining),
      e("div", { style: { fontSize: "10px", color: "#444", fontFamily: "'Courier New', monospace", textTransform: "uppercase", letterSpacing: "2px", marginTop: "4px" } }, "remain")
    )
  );
}

// --- APP ---
function App() {
  var saved = loadState();

  var gs = useState(saved ? saved.gameState : "intro");
  var gameState = gs[0], setGameState = gs[1];
  var dl = useState(saved ? saved.displayedLines : []);
  var displayedLines = dl[0], setDisplayedLines = dl[1];
  var fg = useState(saved ? saved.foundGeocaches : []);
  var foundGeocaches = fg[0], setFoundGeocaches = fg[1];
  var sp = useState(saved ? saved.solvedPuzzles : []);
  var solvedPuzzles = sp[0], setSolvedPuzzles = sp[1];
  var cp = useState(null);
  var currentPuzzle = cp[0], setCurrentPuzzle = cp[1];
  var hu = useState(saved ? saved.hintsUsed : {});
  var hintsUsed = hu[0], setHintsUsed = hu[1];
  var th = useState(saved ? saved.totalHints : 0);
  var totalHints = th[0], setTotalHints = th[1];
  var iv = useState("");
  var inputValue = iv[0], setInputValue = iv[1];
  var _it = useState(false);
  var isTyping = _it[0], setIsTyping = _it[1];
  var si = useState(false);
  var showInput = si[0], setShowInput = si[1];
  var sh = useState(false);
  var showHintBtn = sh[0], setShowHintBtn = sh[1];
  var _se = useState(false);
  var showExploring = _se[0], setShowExploring = _se[1];
  var ca = useState(saved ? saved.clothesDone : false);
  var clothesDone = ca[0], setClothesDone = ca[1];
  var wr = useState(saved ? saved.wrongRocks : 0);
  var wrongRocks = wr[0], setWrongRocks = wr[1];
  var _il = useState(null);
  var idleLine = _il[0], setIdleLine = _il[1];

  var initDone = useRef(false);
  var pendingFind = useRef(null);
  var bottomRef = useRef(null);
  var gameStateRef = useRef(gameState);
  var foundRef = useRef(foundGeocaches);
  var solvedRef = useRef(solvedPuzzles);
  var typingRef = useRef(false);
  var idleTimer = useRef(null);
  var idleCount = useRef(0);
  var idleUsed = useRef([]);

  useEffect(function() { gameStateRef.current = gameState; }, [gameState]);
  useEffect(function() { foundRef.current = foundGeocaches; }, [foundGeocaches]);
  useEffect(function() { solvedRef.current = solvedPuzzles; }, [solvedPuzzles]);
  useEffect(function() { typingRef.current = isTyping; }, [isTyping]);

  // Persist
  useEffect(function() {
    if (gameState === "complete" || gameState === "intro") return;
    saveState({
      gameState: gameState === "puzzle" ? "exploring" : gameState,
      displayedLines: displayedLines,
      foundGeocaches: foundGeocaches,
      solvedPuzzles: solvedPuzzles,
      hintsUsed: hintsUsed,
      totalHints: totalHints,
      clothesDone: clothesDone,
      wrongRocks: wrongRocks
    });
  }, [gameState, displayedLines, foundGeocaches, solvedPuzzles, hintsUsed, totalHints, clothesDone, wrongRocks]);

  useEffect(function() {
    if (bottomRef.current) bottomRef.current.scrollIntoView({ behavior: "smooth" });
  }, [displayedLines, showInput, showExploring]);

  // --- IDLE SYSTEM ---
  function startIdleTimer() {
    stopIdleTimer();
    idleCount.current = 0;
    scheduleNextIdle();
  }
  function stopIdleTimer() {
    if (idleTimer.current) { clearTimeout(idleTimer.current); idleTimer.current = null; }
  }
  function pickUnused(pool) {
    var avail = pool.filter(function(l) { return idleUsed.current.indexOf(l) === -1; });
    if (avail.length === 0) { idleUsed.current = []; avail = pool; }
    var pick = avail[Math.floor(Math.random() * avail.length)];
    idleUsed.current.push(pick);
    return pick;
  }
  function scheduleNextIdle() {
    var base = idleCount.current === 0 ? 25000 : 30000;
    var jitter = Math.random() * (idleCount.current === 0 ? 10000 : 15000);
    idleTimer.current = setTimeout(function() {
      if (gameStateRef.current !== "exploring") return;
      var pool = idleCount.current < 2 ? IDLE_EARLY : idleCount.current < 4 ? IDLE_MID : IDLE_LATE;
      setIdleLine(pickUnused(pool));
      idleCount.current++;
      setTimeout(function() {
        setIdleLine(null);
        if (gameStateRef.current === "exploring") scheduleNextIdle();
      }, 8000);
    }, base + jitter);
  }

  var displayLines = useCallback(function(lines, onComplete) {
    if (!lines || lines.length === 0) { if (onComplete) onComplete(); return; }
    var i = 0;
    setIsTyping(true);
    function showNext() {
      if (i < lines.length) {
        setDisplayedLines(function(p) { return p.concat([lines[i] || ""]); });
        i++;
        var prev = lines[i-1] || "";
        setTimeout(showNext, prev === "..." ? 800 : prev.length < 10 ? 400 : 600);
      } else {
        setIsTyping(false);
        if (onComplete) onComplete();
      }
    }
    showNext();
  }, []);

  function enterExploring() {
    setGameState("exploring");
    setShowExploring(true);
    setIdleLine(null);
    startIdleTimer();
  }
  function leaveExploring() {
    setShowExploring(false);
    setIdleLine(null);
    stopIdleTimer();
  }

  // Init
  useEffect(function() {
    if (initDone.current) return;
    initDone.current = true;
    var params = new URLSearchParams(window.location.search);
    var find = params.get("find");
    if (find) window.history.replaceState({}, "", window.location.pathname);

    if (saved && saved.gameState !== "intro") {
      if (find) {
        setDisplayedLines(function(p) { return p.concat(["---"]); });
        displayLines(RETURN_LINES, function() {
          enterExploring();
          setTimeout(function() { triggerFind(find.toLowerCase()); }, 400);
        });
      } else {
        setTimeout(function() {
          setDisplayedLines(function(p) { return p.concat(["---"]); });
          displayLines(["...you're still here. good."], function() { enterExploring(); });
        }, 500);
      }
    } else {
      if (find) pendingFind.current = find.toLowerCase();
      setTimeout(function() {
        displayLines(INTRO, function() {
          enterExploring();
          if (pendingFind.current) {
            var id = pendingFind.current;
            pendingFind.current = null;
            setTimeout(function() { triggerFind(id); }, 600);
          }
        });
      }, 800);
    }
    return function() { stopIdleTimer(); };
  }, []);

  // NFC listener
  useEffect(function() {
    function handleFocus() {
      var params = new URLSearchParams(window.location.search);
      var find = params.get("find");
      if (find) {
        window.history.replaceState({}, "", window.location.pathname);
        if (gameStateRef.current === "exploring" && !typingRef.current) {
          triggerFind(find.toLowerCase());
        } else {
          pendingFind.current = find.toLowerCase();
        }
      }
    }
    function handlePageShow(ev) { if (ev.persisted) handleFocus(); }
    window.addEventListener("focus", handleFocus);
    window.addEventListener("pageshow", handlePageShow);
    return function() { window.removeEventListener("focus", handleFocus); window.removeEventListener("pageshow", handlePageShow); };
  }, []);

  function triggerFind(id) {
    leaveExploring();
    if (id === "wrongrock") handleWrongRock();
    else if (GEOCACHES[id]) discoverGeocache(id);
  }

  function handleWrongRock() {
    var idx = Math.min(wrongRocks, WRONGROCK.length - 1);
    setWrongRocks(function(p) { return p + 1; });
    setDisplayedLines(function(p) { return p.concat(["---"]); });
    displayLines(WRONGROCK[idx], function() { enterExploring(); });
  }

  function maybeClothes(solvedCount, cb) {
    if (!clothesDone && solvedCount === 3) {
      setClothesDone(true);
      setDisplayedLines(function(p) { return p.concat(["---"]); });
      displayLines(CLOTHES, function() { setTimeout(cb, 800); });
      return;
    }
    if (QUIPS[solvedCount]) {
      setDisplayedLines(function(p) { return p.concat(["---"]); });
      displayLines(QUIPS[solvedCount], function() { setTimeout(cb, 400); });
      return;
    }
    cb();
  }

  function discoverGeocache(geocacheId) {
    var gc = GEOCACHES[geocacheId];
    if (!gc) return;
    if (solvedRef.current.indexOf(geocacheId) !== -1) {
      setDisplayedLines(function(p) { return p.concat(["---"]); });
      displayLines(["you already did this one. i remember even if you don't."], function() { enterExploring(); });
      return;
    }
    if (foundRef.current.indexOf(geocacheId) !== -1) {
      setDisplayedLines(function(p) { return p.concat(["---"]); });
      displayLines(["we were in the middle of this one. let me ask again."], function() {
        setCurrentPuzzle(geocacheId); setGameState("puzzle");
        displayLines(gc.puzzle.prompt, function() { setShowInput(true); setShowHintBtn(true); });
      });
      return;
    }
    setFoundGeocaches(function(p) { return p.concat([geocacheId]); });
    var foundCount = foundRef.current.length;
    var reactionType = foundCount === 0 ? "first" : foundCount < 3 ? "early" : "late";
    setDisplayedLines(function(p) { return p.concat(["---"]); });
    displayLines(gc.reactions[reactionType], function() {
      setTimeout(function() {
        setCurrentPuzzle(geocacheId); setGameState("puzzle");
        displayLines(gc.puzzle.prompt, function() { setShowInput(true); setShowHintBtn(true); });
      }, 600);
    });
  }

  function submitAnswer() {
    if (!currentPuzzle || !inputValue.trim()) return;
    var gc = GEOCACHES[currentPuzzle];
    var puzzle = gc.puzzle;
    var answer = inputValue.trim();
    setInputValue(""); setShowInput(false); setShowHintBtn(false);
    setDisplayedLines(function(p) { return p.concat(["> " + answer]); });
    if (puzzle.validate(answer)) {
      var resp = Array.isArray(puzzle.correctResponse) ? puzzle.correctResponse : [puzzle.correctResponse];
      setTimeout(function() {
        displayLines(resp, function() {
          var newSolved = solvedRef.current.concat([currentPuzzle]);
          setSolvedPuzzles(newSolved);
          setCurrentPuzzle(null);
          if (newSolved.length === 6) {
            setTimeout(function() { completeGame(); }, 1000);
          } else {
            maybeClothes(newSolved.length, function() {
              enterExploring();
              if (pendingFind.current) {
                var id = pendingFind.current;
                pendingFind.current = null;
                setTimeout(function() { triggerFind(id); }, 400);
              }
            });
          }
        });
      }, 500);
    } else {
      var wrongResp;
      if (typeof puzzle.wrongResponse === "function") wrongResp = puzzle.wrongResponse(answer);
      else if (Array.isArray(puzzle.wrongResponse)) wrongResp = puzzle.wrongResponse;
      else wrongResp = [puzzle.wrongResponse];
      setTimeout(function() {
        displayLines(wrongResp, function() { setShowInput(true); setShowHintBtn(true); });
      }, 400);
    }
  }

  function requestHint() {
    if (!currentPuzzle) return;
    var gc = GEOCACHES[currentPuzzle];
    var count = hintsUsed[currentPuzzle] || 0;
    if (count >= gc.puzzle.hints.length) return;
    var text = gc.puzzle.hints[count];
    setHintsUsed(function(p) { var n = {}; for (var k in p) n[k] = p[k]; n[currentPuzzle] = count + 1; return n; });
    setTotalHints(function(p) { return p + 1; });
    setShowInput(false); setShowHintBtn(false);
    var prefix = count === 0 ? ["...fine."] : count === 1 ? ["this is the part where i try not to be judgmental."] : ["we're not going to talk about how many times you've asked."];
    displayLines(prefix.concat([text]), function() {
      setShowInput(true);
      if (count + 1 < gc.puzzle.hints.length) setShowHintBtn(true);
    });
  }

  function completeGame() {
    clearState();
    var msgs = totalHints === 0 ? COMPLETE.noHints : totalHints <= 3 ? COMPLETE.someHints : COMPLETE.manyHints;
    setDisplayedLines(function(p) { return p.concat(["---"]); });
    displayLines(msgs, function() { setGameState("complete"); });
  }

  var remaining = 6 - solvedPuzzles.length;

  // --- RENDER ---
  return e("div", {
    style: { minHeight: "100vh", minHeight: "100dvh", backgroundColor: "#0a0a0a", color: "#c8c8c8", fontFamily: "'Courier New', Courier, monospace", fontSize: "15px", lineHeight: "1.6", padding: "20px 16px", maxWidth: "100%", boxSizing: "border-box", position: "relative" }
  },
    // Text
    e("div", { style: { paddingBottom: "20px" } },
      displayedLines.map(function(line, i) {
        if (line === null || line === undefined) return null;
        if (line === "---") return e("hr", { key: "l"+i, style: { border: "none", borderTop: "1px solid #1a1a1a", margin: "24px 0" } });
        if (typeof line === "string" && line.indexOf("> ") === 0)
          return e("p", { key: "l"+i, style: { margin: 0, padding: "2px 0", opacity: 0, animation: "fadeIn 0.4s ease forwards", color: "#555", fontSize: "14px" } }, line);
        return e("p", { key: "l"+i, style: { margin: 0, padding: "2px 0", opacity: 0, animation: "fadeIn 0.4s ease forwards" } }, line);
      }),
      isTyping ? e("span", { style: { display: "inline-block", width: "8px", height: "15px", backgroundColor: "#c8c8c8", marginLeft: "2px", marginTop: "4px", animation: "blink 1s step-end infinite" } }) : null
    ),

    // --- EXPLORING: Scanner + idle ---
    showExploring && !isTyping && gameState === "exploring" && remaining > 0 ? e("div", {
      style: { opacity: 0, animation: "fadeIn 0.6s ease 0.3s forwards" }
    },
      e(Scanner, { remaining: remaining }),
      idleLine ? e("p", {
        key: "idle-" + idleLine,
        style: { textAlign: "center", color: "#444", fontSize: "13px", marginTop: "16px", fontStyle: "italic", opacity: 0, animation: "fadeIn 0.6s ease forwards" }
      }, idleLine) : e("p", {
        style: { textAlign: "center", color: "#2a2a2a", fontSize: "12px", marginTop: "16px", letterSpacing: "1px", animation: "idleFade 4s ease-in-out infinite" }
      }, "scanning")
    ) : null,

    // --- PUZZLE INPUT ---
    showInput && !isTyping && gameState === "puzzle" ? e("div", {
      style: { marginTop: "16px", display: "flex", flexDirection: "column", gap: "10px" }
    },
      e("input", {
        style: { backgroundColor: "#111", border: "1px solid #333", color: "#c8c8c8", fontFamily: "'Courier New', Courier, monospace", fontSize: "16px", padding: "12px", borderRadius: 0, outline: "none", width: "100%", boxSizing: "border-box", WebkitAppearance: "none" },
        type: "text", value: inputValue,
        onChange: function(ev) { setInputValue(ev.target.value); },
        onKeyDown: function(ev) { if (ev.key === "Enter") submitAnswer(); },
        placeholder: "...", autoFocus: true, autoComplete: "off", autoCapitalize: "off", spellCheck: false
      }),
      e("div", { style: { display: "flex", gap: "12px", alignItems: "center" } },
        e("button", {
          style: { backgroundColor: "transparent", border: "1px solid #444", color: "#888", fontFamily: "'Courier New', Courier, monospace", fontSize: "13px", padding: "10px 20px", cursor: "pointer" },
          onClick: submitAnswer
        }, "submit"),
        showHintBtn ? e("button", {
          style: { backgroundColor: "transparent", border: "1px solid #2a2a2a", color: "#444", fontFamily: "'Courier New', Courier, monospace", fontSize: "12px", padding: "8px 14px", cursor: "pointer" },
          onClick: requestHint
        }, "i need help") : null
      )
    ) : null,

    // --- PROGRESS DOTS ---
    e("div", {
      style: { position: "fixed", bottom: 0, left: 0, right: 0, display: "flex", justifyContent: "center", gap: "12px", padding: "14px 12px", paddingBottom: "max(14px, env(safe-area-inset-bottom))", backgroundColor: "#0a0a0aee", borderTop: "1px solid #111" }
    },
      geocacheKeys.map(function(id) {
        var solved = solvedPuzzles.indexOf(id) !== -1;
        var found = foundGeocaches.indexOf(id) !== -1;
        return e("div", { key: id, style: { width: "8px", height: "8px", borderRadius: "50%", backgroundColor: solved ? "#c8c8c8" : found ? "#444" : "#1a1a1a", transition: "all 0.4s ease", animation: solved ? "pulseDot 0.6s ease" : "none" } });
      })
    ),
    e("div", { ref: bottomRef, style: { height: "80px" } })
  );
}

ReactDOM.render(e(App), document.getElementById("root"));
</script>
</body>
</html>
