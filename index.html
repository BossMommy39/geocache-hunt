  function startIdleTimer() {

    var pick = avail[Math.floor(Math.random() * avail.length)];
    idleUsed.current.push(pick);

  }
  function scheduleNextIdle() {
    var base = idleCount.current === 0 ? 25000 : 30000;

  function leaveExploring() {
    setShowExploring(false);
    setIdleLine(null);
    stopIdleTimer();
  }

  // --- CORRECT ANSWER FEEDBACK (change 4) ---
  function triggerCorrectFeedback() {
    try { navigator.vibrate([50, 30, 80]); } catch(ex) {}
    setIsFlashing(true);
    setTimeout(function() { setIsFlashing(false); }, 150);
  }

  // --- GLITCH SEQUENCE (change 5, Moment 2) ---
  function triggerGlitch(onDone) {
    setGlitchDone(true);
    glitchDoneRef.current = true;

    // Vibrate stutter pattern
    try { navigator.vibrate([20, 50, 20, 50, 20, 100, 40]); } catch(ex) {}

    // Low tone via Web Audio
    try {
      var ctx = new (window.AudioContext || window.webkitAudioContext)();
      var osc = ctx.createOscillator();
      var gain = ctx.createGain();
      osc.type = "sine";
      osc.frequency.value = 80;
      gain.gain.value = 0.15;
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start();
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.8);
      osc.stop(ctx.currentTime + 0.8);
    } catch(ex) {}

    // 1. Clear screen
    setDisplayedLines([]);

    // 2. After brief pause, show garbled lines
    setTimeout(function() {
      var glitchSeq = [
        GP + "y\u0338ou f\u0336ound \u2014 n\u0337o. wait.",
        GP + "r\u0336un.seq[0x44] \u2014 \u0305e\u0336r\u0337r\u0305o\u0336r\u0337 d\u0305e\u0336t\u0337ec\u0305ted",
        GP + "\u0305\u0336\u0337[src.ann.v1] c\u0336o\u0337nnect\u0305 \u0336fa\u0337il\u0305ed",
        GP + "\uD83C\uDF89 Great job! You're halfway there! Keep searching for more Easter fun! \uD83C\uDF89"
      ];
      displayLines(glitchSeq, function() {
        // 3. Blackout for 2 seconds
        setTimeout(function() {
          setIsBlackout(true);
          setTimeout(function() {
            setIsBlackout(false);
            // 4. Clear glitch lines, show recovery text
            setDisplayedLines([]);
            setTimeout(function() {
              displayLines(
                ["...no.", "that's not \u2014 ignore that. the old version is still in here somewhere.", "it's fine. keep going."],
                function() {
                  setTimeout(onDone, 600);
                }
              );
            }, 200);
          }, 2000);
        }, 400);
      });
    }, 500);
  }

  // --- INIT ---
  useEffect(function() {
    if (initDone.current) return;
    initDone.current = true;
    var params = new URLSearchParams(window.location.search);
    var find = params.get("find");
    var name = params.get("name");
    if (find || name) window.history.replaceState({}, "", window.location.pathname);

    // Store player name if provided and not already set (change 8)
    if (name && !playerNameRef.current) {
      setPlayerName(name);
      playerNameRef.current = name;
    }

    if (saved && saved.gameState !== "intro") {
      if (find) {
        setDisplayedLines(function(p) { return p.concat(["---"]); });
        displayLines(RETURN_LINES, function() {
          enterExploring();
          setTimeout(function() { triggerFind(find.toLowerCase()); }, 400);
        });
      } else {
        setTimeout(function() {
          setDisplayedLines(function(p) { return p.concat(["---"]); });
          displayLines(["...you're still here. good."], function() { enterExploring(); });
        }, 500);
      }
    } else {
      if (find) pendingFind.current = find.toLowerCase();
      setTimeout(function() {
        displayLines(INTRO, function() {
          enterExploring();
          if (pendingFind.current) {
            var id = pendingFind.current;
            pendingFind.current = null;
            setTimeout(function() { triggerFind(id); }, 600);
          }
        });
      }, 800);
    }
    return function() {
      stopIdleTimer();
      if (stillHereTimer.current) clearTimeout(stillHereTimer.current);
    };
  }, []);

  // --- NFC LISTENER (unchanged) ---
  useEffect(function() {
    function handleFocus() {
      var params = new URLSearchParams(window.location.search);
      var find = params.get("find");
      if (find) {
        window.history.replaceState({}, "", window.location.pathname);
        if (gameStateRef.current === "exploring" && !typingRef.current) {
          triggerFind(find.toLowerCase());
        } else {
          pendingFind.current = find.toLowerCase();
        }
      }
    }
    function handlePageShow(ev) { if (ev.persisted) handleFocus(); }
    window.addEventListener("focus", handleFocus);
    window.addEventListener("pageshow", handlePageShow);
    return function() { window.removeEventListener("focus", handleFocus); window.removeEventListener("pageshow", handlePageShow); };
  }, []);

  // --- TRIGGER FIND (change 3: clear screen) ---
  function triggerFind(id) {
    leaveExploring();
    setDisplayedLines([]); // Fresh screen for each geocache discovery
    if (id === "wrongrock") handleWrongRock();
    else if (GEOCACHES[id]) discoverGeocache(id);
  }

  function handleWrongRock() {
    var idx = Math.min(wrongRocks, WRONGROCK.length - 1);
    setWrongRocks(function(p) { return p + 1; });
    displayLines(WRONGROCK[idx], function() { enterExploring(); });
  }

  // --- MAYBE CLOTHES (change 3: removed "---" on clothes, kept on quips for mid-screen separation) ---
  function maybeClothes(solvedCount, cb) {
    if (!clothesDone && solvedCount === 3) {
      setClothesDone(true);
      setDisplayedLines(function(p) { return p.concat(["---"]); });
      displayLines(CLOTHES, function() { setTimeout(cb, 800); });
      return;
    }
    if (QUIPS[solvedCount]) {
      setDisplayedLines(function(p) { return p.concat(["---"]); });
      displayLines(QUIPS[solvedCount], function() { setTimeout(cb, 400); });
      return;
    }
    cb();
  }

  // --- DISCOVER GEOCACHE (changes 3, 8, 9) ---
  function discoverGeocache(geocacheId) {
    var gc = GEOCACHES[geocacheId];
    if (!gc) return;

    if (solvedRef.current.indexOf(geocacheId) !== -1) {
      displayLines(["you already did this one. i remember even if you don't."], function() { enterExploring(); });
      return;
    }
    if (foundRef.current.indexOf(geocacheId) !== -1) {
      displayLines(["we were in the middle of this one. let me ask again."], function() {
        setCurrentPuzzle(geocacheId); setGameState("puzzle");
        displayLines(gc.puzzle.prompt, function() { setShowInput(true); setShowHintBtn(true); });
      });
      return;
    }

    setFoundGeocaches(function(p) { return p.concat([geocacheId]); });
    var foundCount = foundRef.current.length;
    var reactionType = foundCount === 0 ? "first" : foundCount < 3 ? "early" : "late";

    // Change 9: last geocache override (5 already solved = this is the 6th)
    var isLastGeocache = solvedRef.current.length === 5;
    if (isLastGeocache) {
      displayLines(["so this is the last one."], function() {
        setTimeout(function() {
          displayLines(["let's make it count."], function() {
            setTimeout(function() {
              setCurrentPuzzle(geocacheId); setGameState("puzzle");
              displayLines(gc.puzzle.prompt, function() { setShowInput(true); setShowHintBtn(true); });
            }, 600);
          });
        }, 800);
      });
      return;
    }

    var reactLines = gc.reactions[reactionType].slice();

    // Change 8: use player name once, first puzzle after glitch
    if (glitchDoneRef.current && playerNameRef.current && !nameUsedRef.current) {
      reactLines = reactLines.concat(["you're doing well, " + playerNameRef.current + "."]);
      setNameUsed(true);
      nameUsedRef.current = true;
    }

    displayLines(reactLines, function() {
      setTimeout(function() {
        setCurrentPuzzle(geocacheId); setGameState("puzzle");
        displayLines(gc.puzzle.prompt, function() { setShowInput(true); setShowHintBtn(true); });
      }, 600);
    });
  }

  // --- SUBMIT ANSWER (changes 4, 6) ---
  function submitAnswer() {
    if (!currentPuzzle || !inputValue.trim()) return;
    var gc = GEOCACHES[currentPuzzle];
    var puzzle = gc.puzzle;
    var answer = inputValue.trim();
    setInputValue(""); setShowInput(false); setShowHintBtn(false);
    setDisplayedLines(function(p) { return p.concat(["> " + answer]); });

    // Change 6: tab-away cheating detection (fires once)
    var wasCaught = tabAwayRef.current && !cheatingCaughtRef.current;
    if (wasCaught) {
      tabAwayRef.current = false;
      setCheatingCaught(true);
      cheatingCaughtRef.current = true;
    }

    function proceedWithAnswer() {
      if (puzzle.validate(answer)) {
        // Change 4: vibrate + flash on correct
        triggerCorrectFeedback();
        var resp = Array.isArray(puzzle.correctResponse) ? puzzle.correctResponse : [puzzle.correctResponse];
        setTimeout(function() {
          // Change 4: slower typing for correct responses (campfire moment)
          displayLines(resp, function() {
            var newSolved = solvedRef.current.concat([currentPuzzle]);
            setSolvedPuzzles(newSolved);
            setCurrentPuzzle(null);
            if (newSolved.length === 6) {
              setTimeout(function() { completeGame(); }, 1000);
            } else {
              maybeClothes(newSolved.length, function() {
                // Change 5 Moment 2: glitch fires after 4th solve (once only)
                if (newSolved.length === 4 && !glitchDoneRef.current) {
                  triggerGlitch(function() {
                    setDisplayedLines([]); // Change 3: clear before scanner
                    enterExploring();
                    if (pendingFind.current) {
                      var pid = pendingFind.current;
                      pendingFind.current = null;
                      setTimeout(function() { triggerFind(pid); }, 400);
                    }
                  });
                } else {
                  setDisplayedLines([]); // Change 3: clear before scanner
                  enterExploring();
                  if (pendingFind.current) {
                    var pid2 = pendingFind.current;
                    pendingFind.current = null;
                    setTimeout(function() { triggerFind(pid2); }, 400);
                  }
                }
              });
            }
          }, { slow: true }); // Change 4: slow for correct response
        }, 500);
      } else {
        // Wrong answer — append without clearing (mid-puzzle, change 3 exception)
        var wrongResp;
        if (typeof puzzle.wrongResponse === "function") wrongResp = puzzle.wrongResponse(answer);
        else if (Array.isArray(puzzle.wrongResponse)) wrongResp = puzzle.wrongResponse;
        else wrongResp = [puzzle.wrongResponse];
        setTimeout(function() {
          displayLines(wrongResp, function() { setShowInput(true); setShowHintBtn(true); });
        }, 400);
      }
    }

    // Inject cheating lines before normal response (change 6)
    if (wasCaught) {
      setTimeout(function() {
        displayLines(["...you just looked that up, didn't you.", "i'm not mad. i'm just aware."], function() {
          proceedWithAnswer();
        });
      }, 400);
    } else {
      proceedWithAnswer();
    }
  }

  // --- REQUEST HINT (unchanged) ---
  function requestHint() {
    if (!currentPuzzle) return;
    var gc = GEOCACHES[currentPuzzle];
    var count = hintsUsed[currentPuzzle] || 0;
    if (count >= gc.puzzle.hints.length) return;
    var text = gc.puzzle.hints[count];
    setHintsUsed(function(p) { var n = {}; for (var k in p) n[k] = p[k]; n[currentPuzzle] = count + 1; return n; });
    setTotalHints(function(p) { return p + 1; });
    setShowInput(false); setShowHintBtn(false);
    var prefix = count === 0 ? ["...fine."] : count === 1 ? ["this is the part where i try not to be judgmental."] : ["we're not going to talk about how many times you've asked."];
    displayLines(prefix.concat([text]), function() {
      setShowInput(true);
      if (count + 1 < gc.puzzle.hints.length) setShowHintBtn(true);
    });
  }

  // --- COMPLETE GAME (change 5 Moment 3) ---
  function completeGame() {
    clearState();
    if (stillHereTimer.current) clearTimeout(stillHereTimer.current);
    var msgs = totalHints === 0 ? COMPLETE.noHints : totalHints <= 3 ? COMPLETE.someHints : COMPLETE.manyHints;
    setDisplayedLines([]); // Change 3: fresh screen for completion
    displayLines(msgs.concat(["if she asks about the voice, tell her everything worked perfectly."]), function() {
      setGameState("complete");
      // Change 5 Moment 3: ghost line after 60 seconds
      stillHereTimer.current = setTimeout(function() {
        setGhostLine(true);
      }, 60000);
    });
  }

  var remaining = 6 - solvedPuzzles.length;

  // --- BLACKOUT (change 10) ---
  if (isBlackout) {
    return e("div", { style: { minHeight: "100vh", minHeight: "100dvh", backgroundColor: "#0a0a0a" } });
  }

  // --- RENDER ---
  return e("div", {
    style: {
      minHeight: "100vh",
      minHeight: "100dvh",
      // Change 4: flash effect via background-color transition
      backgroundColor: isFlashing ? "#111" : "#0a0a0a",
      transition: "background-color 0.15s ease",
      color: "#c8c8c8",
      fontFamily: "'Courier New', Courier, monospace",
      fontSize: "15px",
      lineHeight: "1.6",
      padding: "20px 16px",
      maxWidth: "100%",
      boxSizing: "border-box",
      position: "relative"
    }
  },
    // Text lines
    e("div", { style: { paddingBottom: "20px" } },
      displayedLines.map(function(line, i) {
        if (line === null || line === undefined) return null;
        if (line === "---") return e("hr", { key: "l"+i, style: { border: "none", borderTop: "1px solid #1a1a1a", margin: "24px 0" } });

        // Change 10: detect glitch prefix for special styling
        var isGlitchLine = typeof line === "string" && line.indexOf(GP) === 0;
        var text = isGlitchLine ? line.slice(GP.length) : line;

        if (typeof text === "string" && text.indexOf("> ") === 0) {
          return e("p", { key: "l"+i, style: { margin: 0, padding: "2px 0", opacity: 0, animation: "fadeIn 0.4s ease forwards", color: "#555", fontSize: "14px" } }, text);
        }
        return e("p", {
          key: "l"+i,
          style: {
            margin: 0,
            padding: "2px 0",
            opacity: 0,
            // Change 10: glitch lines get glitchText animation and reddish tint
            animation: isGlitchLine
              ? "glitchText 0.3s ease infinite, fadeIn 0.4s ease forwards"
              : "fadeIn 0.4s ease forwards",
            color: isGlitchLine ? "#884444" : undefined
          }
        }, text);
      }),

      // Change 5 Moment 3: ghost line — dim, no animation, just exists
      ghostLine ? e("p", {
        key: "ghost",
        style: { margin: 0, padding: "2px 0", color: "#333", opacity: 1 }
      }, "you're still here.") : null,

      isTyping ? e("span", { style: { display: "inline-block", width: "8px", height: "15px", backgroundColor: "#c8c8c8", marginLeft: "2px", marginTop: "4px", animation: "blink 1s step-end infinite" } }) : null
    ),

    // Scanner + idle (unchanged)
    showExploring && !isTyping && gameState === "exploring" && remaining > 0 ? e("div", {
      style: { opacity: 0, animation: "fadeIn 0.6s ease 0.3s forwards" }
    },
      e(Scanner, { remaining: remaining }),
      idleLine ? e("p", {
        key: "idle-" + idleLine,
        style: { textAlign: "center", color: "#444", fontSize: "13px", marginTop: "16px", fontStyle: "italic", opacity: 0, animation: "fadeIn 0.6s ease forwards" }
      }, idleLine) : e("p", {
        style: { textAlign: "center", color: "#2a2a2a", fontSize: "12px", marginTop: "16px", letterSpacing: "1px", animation: "idleFade 4s ease-in-out infinite" }
      }, "scanning")
    ) : null,

    // Puzzle input (unchanged)
    showInput && !isTyping && gameState === "puzzle" ? e("div", {
      style: { marginTop: "16px", display: "flex", flexDirection: "column", gap: "10px" }
    },
      e("input", {
        style: { backgroundColor: "#111", border: "1px solid #333", color: "#c8c8c8", fontFamily: "'Courier New', Courier, monospace", fontSize: "16px", padding: "12px", borderRadius: 0, outline: "none", width: "100%", boxSizing: "border-box", WebkitAppearance: "none" },
        type: "text", value: inputValue,
        onChange: function(ev) { setInputValue(ev.target.value); },
        onKeyDown: function(ev) { if (ev.key === "Enter") submitAnswer(); },
        placeholder: "...", autoFocus: true, autoComplete: "off", autoCapitalize: "off", spellCheck: false
      }),
      e("div", { style: { display: "flex", gap: "12px", alignItems: "center" } },
        e("button", {
          style: { backgroundColor: "transparent", border: "1px solid #444", color: "#888", fontFamily: "'Courier New', Courier, monospace", fontSize: "13px", padding: "10px 20px", cursor: "pointer" },
          onClick: submitAnswer
        }, "submit"),
        showHintBtn ? e("button", {
          style: { backgroundColor: "transparent", border: "1px solid #2a2a2a", color: "#444", fontFamily: "'Courier New', Courier, monospace", fontSize: "12px", padding: "8px 14px", cursor: "pointer" },
          onClick: requestHint
        }, "i need help") : null
      )
    ) : null,

    // Progress dots (unchanged)
    e("div", {
      style: { position: "fixed", bottom: 0, left: 0, right: 0, display: "flex", justifyContent: "center", gap: "12px", padding: "14px 12px", paddingBottom: "max(14px, env(safe-area-inset-bottom))", backgroundColor: "#0a0a0aee", borderTop: "1px solid #111" }
    },
      geocacheKeys.map(function(id) {
        var solved = solvedPuzzles.indexOf(id) !== -1;
        var found = foundGeocaches.indexOf(id) !== -1;
        return e("div", { key: id, style: { width: "8px", height: "8px", borderRadius: "50%", backgroundColor: solved ? "#c8c8c8" : found ? "#444" : "#1a1a1a", transition: "all 0.4s ease", animation: solved ? "pulseDot 0.6s ease" : "none" } });
      })
    ),
    e("div", { ref: bottomRef, style: { height: "80px" } })
  );
}

ReactDOM.render(e(App), document.getElementById("root"));
</script>
</body>
</html>
