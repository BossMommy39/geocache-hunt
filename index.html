<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>...</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{height:100%;overflow-y:scroll;-webkit-overflow-scrolling:touch}
body{background:#0a0a0a;color:#c8c8c8;font-family:'Courier New',Courier,monospace;font-size:15px;line-height:1.6;min-height:100%;position:relative;transition:background-color 0.15s ease}
body::after{content:'';position:fixed;top:0;left:0;right:0;bottom:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px);pointer-events:none;z-index:9999}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes pulseDot{0%{transform:scale(1)}50%{transform:scale(1.4)}100%{transform:scale(1)}}
@keyframes scanPulse{0%{transform:scale(0.3);opacity:0.6}100%{transform:scale(1);opacity:0}}
@keyframes scanRotate{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
@keyframes idleFade{0%,100%{opacity:0.3}50%{opacity:0.6}}
@keyframes glitchText{0%{transform:translateX(0);opacity:1}20%{transform:translateX(-3px);opacity:0.8}40%{transform:translateX(2px);opacity:0.9}60%{transform:translateX(-1px);opacity:0.7}80%{transform:translateX(3px);opacity:0.85}100%{transform:translateX(0);opacity:1}}
input::placeholder{color:#333}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:#0a0a0a}
::-webkit-scrollbar-thumb{background:#222;border-radius:2px}
input:focus{outline:none;border-color:#555 !important}
button:active{opacity:0.6}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
(function(){
var useState=React.useState,useEffect=React.useEffect,useRef=React.useRef,useCallback=React.useCallback,useMemo=React.useMemo;
var e=React.createElement;

// STORAGE
var SK="gch_v6";
function save(s){try{localStorage.setItem(SK,JSON.stringify(s))}catch(x){}}
function load(){try{var r=localStorage.getItem(SK);return r?JSON.parse(r):null}catch(x){return null}}
function clear(){try{localStorage.removeItem(SK)}catch(x){}}

// READ URL PARAMS BEFORE REACT MOUNTS
var _p=new URLSearchParams(window.location.search);
var _find=_p.get("find");
var _name=_p.get("name");
if(_find||_name){try{window.history.replaceState({},"",window.location.pathname)}catch(x){}}

// SAVE NAME IF PROVIDED
if(_name){try{localStorage.setItem("gch_name",_name)}catch(x){}}
function getName(){
  if(_name)return _name;
  try{return localStorage.getItem("gch_name")||null}catch(x){return null}
}
function normalizeFind(v){
  if(!v)return null;
  var s=(v+'').toLowerCase().trim();
  if(s==='poop'||s==='dogpoop'||s==='dog-poop'||s==='dog_poop'||s==='dog poop'||s==='that')return 'dogpoop';
  if(s==='mush'||s==='mushroom'||s==='shroom')return 'mushroom';
  if(s==='pinecone'||s==='cone')return 'pinecone';
  if(s==='spider'||s==='frog'||s==='rock'||s==='wrongrock')return s;
  return s;
}

// GAME DATA
var GC={
  rock:{id:"rock",name:"rock",
    reactions:{
      first:["...","a rock.","bold opening move.","statistically there were many wrong ones.","you committed anyway."],
      early:["a rock.","most people walk right past it.","you did not."],
      late:["oh, the rock.","i was wondering when you'd get here."]},
    puzzle:{
      prompt:["you found one rock in a yard full of them.","which brings us to people who are bad at finding things.","the united states military has lost nuclear weapons.","","question.","how many are still missing."],
      validate:function(a){var n=a.toLowerCase().trim();return n==="6"||n==="six"||n==="half a dozen"},
      correct:["six.","which is six more than anyone should lose.","one is in a swamp in north carolina.","they put up a sign.","a sign."],
      wrong:function(a){var n=parseInt(a);if(!isNaN(n)&&n>=1&&n<=5)return["higher. you're giving them too much credit."];if(!isNaN(n)&&n>=10)return["lower. but i respect that you assumed the worst immediately."];if(!isNaN(n)&&n>=7&&n<=9)return["close. but no. try again."];return["it's a number.","between 1 and 10."]},
      hints:["single digits.","which is not the comfort it sounds like.","more than 4. less than 8.","six. the answer is six."]}},
  pinecone:{id:"pinecone",name:"pinecone",
    reactions:{
      first:["a pinecone.","solid.","low-risk opening move."],
      early:["pinecone.","nature's grenade."],
      late:["this was literally just sitting there.","freebie."]},
    puzzle:{
      prompt:["","question.","which is older.","oxford university or the aztec empire."],
      validate:function(a){return a.toLowerCase().trim().indexOf("oxford")!==-1},
      correct:["oxford.","by about 300 years.","they were handing out degrees before the aztecs existed.","...history is weird."],
      wrong:["no.","pick the one that feels wrong."],
      hints:["i literally told you to pick the one that feels wrong.","one started in 1096. the other in 1428.","oxford. it's oxford."]}},
  mushroom:{id:"mushroom",name:"mushroom",
    reactions:{
      first:["the mushroom.","classic.","this feels like a trap.","it isn't.","but it feels like it."],
      early:["ah. mushroom.","good instincts or gamer damage.","hard to tell."],
      late:["you found the mushroom.","it was just sitting there.","menacingly."]},
    puzzle:{
      prompt:["","question.","in undertale, what happens if you type 'frisk' on the name screen."],
      validate:function(a){var l=a.toLowerCase().trim();return l.indexOf("hard")!==-1&&(l.indexOf("mode")!==-1||l.indexOf("difficult")!==-1||l.length<12)},
      correct:["hard mode.","you used a name you weren't supposed to know yet.","so the game punished you.","fair."],
      wrong:["no.","think about what toby fox would do with forbidden knowledge."],
      hints:["frisk is the name you learn at the end.","the game changes difficulty.","hard mode."]}},
  dogpoop:{id:"dogpoop",name:"that",
    reactions:{
      first:["...","you picked that up.","no hesitation.","that's a personality trait."],
      early:["you did it again.","this is becoming a pattern."],
      late:["five normal objects.","five chances to pivot.","and then this.","incredible consistency."]},
    puzzle:{
      prompt:["you committed.","so now you get something permanent.","","question.","what animal poops cubes."],
      validate:function(a){return a.toLowerCase().trim().indexOf("wombat")!==-1},
      correct:["wombats.","perfect cubes.","like nature installed a geometry update.","a real scientist studied this.","you picked up fake poop and got smarter.","humiliating."],
      wrong:["no.","it's australian.","that should narrow it down."],
      hints:["marsupial.","built like an angry potato.","wombat."]}},
  spider:{id:"spider",name:"spider",
    reactions:{
      first:["...","spider first.","so that's who you are.","useful data."],
      early:["the spider.","no hesitation.","interesting."],
      late:["finally.","the spider was getting offended."]},
    puzzle:{
      prompt:["","question.","what predator has a 95 percent kill rate.","highest on earth."],
      validate:function(a){var l=a.toLowerCase().trim();return l.indexOf("dragonfl")!==-1||l.indexOf("dragon fl")!==-1},
      correct:["dragonfly.","95 percent.","lions are at 25.","your house cat is doing better than a lion.","embarrassing for the lion community."],
      wrong:function(a){var l=a.toLowerCase().trim();var big=["lion","shark","cheetah","wolf","eagle","bear","tiger","orca","crocodile","croc","hawk","falcon","spider","snake","leopard","jaguar","panther","great white"];for(var i=0;i<big.length;i++){if(l.indexOf(big[i])!==-1)return["no.","you're thinking like someone who watches nature documentaries.","smaller."]}return["no.","smaller.","way smaller."]},
      hints:["it flies.","it is an insect.","dragonfly."]}},
  frog:{id:"frog",name:"frog",
    reactions:{
      first:["the frog.","strong start.","look at its face.","it knows something."],
      early:["the frog.","still weird.","still judging you."],
      late:["the frog has been waiting.","patiently."]},
    puzzle:{
      prompt:["","question.","which is bigger.","the number of ways to arrange a deck of 52 cards.","or the number of atoms on earth."],
      validate:function(a){var l=a.toLowerCase().trim();return l.indexOf("card")!==-1||l.indexOf("deck")!==-1||l.indexOf("shuffle")!==-1||l.indexOf("arrange")!==-1||l.indexOf("52")!==-1||l.indexOf("factorial")!==-1},
      correct:["the cards.","and it's not close.","every shuffle is probably unique.","ever.","you have almost definitely never seen the same deck twice.","...that should bother you."],
      wrong:["no.","you're underestimating how weird cards are.","try again."],
      hints:["one of these numbers has about 50 digits.","the other has more.","cards. it's the cards."]}}
};

var INTRO=["...","oh.","you found it.","good.","there are six objects.","they are not random.","one of you is about to take this too seriously.","i'm watching for that.","","find one.","tap it.","go."];
var CLOTHES=["this isn't part of the game. i just want to know.","which one of you has gone the longest without changing clothes. don't answer. just look at each other.","...that was fast. and unanimous. wow.","that one wasn't mine, by the way. it was already in here when i showed up."];
var COMPLETE={
  no:["...","you did all six.","no help.","annoying.","...but impressive.","go find the person who sent you out here.","you earned it."],
  some:["...","all six.","with some assistance.","i'm choosing to respect the effort.","go find the person who sent you out here.","you earned it."],
  many:["...","you got there.","eventually.","with a lot of help.","but you didn't quit.","that counts.","go find the person who sent you out here."]
};
var QUIPS={
  1:["how many of you are reading this right now.","...yeah. that's too many.","one of you should be looking for the next one."],
  2:["two down.","you're either fast or lucky.","i haven't decided which yet."],
  3:["halfway.","you're actually doing this."],
  4:["you've developed a pattern.","i'm not saying it's good.","i'm saying it's consistent."],
  5:["one more.","one of you knew that answer immediately.","and one of you pretended you did.","i saw both.","also, whoever touched the fake poop first.","bold."]
};
var WRONGROCK=[
  ["wrong rock.","but the confidence was incredible."],
  ["still wrong.","this is becoming a lifestyle choice."],
  ["another wrong rock.","you are now emotionally invested in rocks."],
  ["i admire the commitment.","not the accuracy."]
];
var IDLE_E=["still looking.","take your time. i'm not going anywhere. literally.","you're walking in a pattern. i don't think you know that.","...interesting strategy.","i can see all of them from here. just so you know."];
var IDLE_M=["you've walked past one twice now.","i'm not going to tell you which direction to look. but i will say... down.","one of them is closer than you think. one of them isn't.","the obvious spots are obvious for a reason.","you're overthinking this. or underthinking it. hard to tell."];
var IDLE_L=["at this point i'm invested.","you know they're not going to move, right. they're objects.","i believe in you. don't make me regret saying that.","look where you haven't looked. that's free advice. you're welcome.","...are you just enjoying the walk? because that's fine too. i guess."];
var GLITCH=["y̶o̶u̅ fo̶u̶n̅d — n̶o̅. wait.","🎉 Great job! You're halfway there! Keep searching for more Easter fun! 🎉","i̶ d̶on̅'t — th̶at̅'s not —"];

var KEYS=Object.keys(GC);

function playTone(){try{var c=new(window.AudioContext||window.webkitAudioContext)();var o=c.createOscillator();var g=c.createGain();o.type="sine";o.frequency.value=80;g.gain.value=0.15;o.connect(g);g.connect(c.destination);o.start();g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.8);o.stop(c.currentTime+0.8)}catch(x){}}
function vib(p){try{navigator.vibrate(p)}catch(x){}}

// SCANNER
function Scanner(p){
  return e("div",{style:{position:"relative",width:"120px",height:"120px",margin:"30px auto 10px auto"}},
    e("div",{style:{position:"absolute",top:0,left:0,right:0,bottom:0,borderRadius:"50%",border:"1px solid #1a1a1a",animation:"scanPulse 3s ease-out infinite"}}),
    e("div",{style:{position:"absolute",top:0,left:0,right:0,bottom:0,borderRadius:"50%",border:"1px solid #1a1a1a",animation:"scanPulse 3s ease-out 1s infinite"}}),
    e("div",{style:{position:"absolute",top:0,left:0,right:0,bottom:0,borderRadius:"50%",border:"1px solid #1a1a1a",animation:"scanPulse 3s ease-out 2s infinite"}}),
    e("div",{style:{position:"absolute",top:"15px",left:"15px",right:"15px",bottom:"15px",borderRadius:"50%",border:"1px dashed #222",animation:"scanRotate 12s linear infinite"}}),
    e("div",{style:{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",textAlign:"center"}},
      e("div",{style:{fontSize:"22px",color:"#c8c8c8",fontWeight:"bold",lineHeight:"1"}},p.n),
      e("div",{style:{fontSize:"10px",color:"#444",textTransform:"uppercase",letterSpacing:"2px",marginTop:"4px"}},"remain")))
}

// APP
function App(){
  var saved=useMemo(function(){return load()},[]);
  var pName=getName();

  var _gs=useState(saved?saved.gs||"exploring":"intro"),gs=_gs[0],setGs=_gs[1];
  var _lines=useState(saved?saved.lines||[]:[]),lines=_lines[0],setLines=_lines[1];
  var _found=useState(saved?saved.found||[]:[]),found=_found[0],setFound=_found[1];
  var _solved=useState(saved?saved.solved||[]:[]),solved=_solved[0],setSolved=_solved[1];
  var _cur=useState(null),cur=_cur[0],setCur=_cur[1];
  var _hu=useState(saved?saved.hu||{}:{}),hu=_hu[0],setHu=_hu[1];
  var _th=useState(saved?saved.th||0:0),th=_th[0],setTh=_th[1];
  var _inp=useState(""),inp=_inp[0],setInp=_inp[1];
  var _typing=useState(false),typing=_typing[0],setTyping=_typing[1];
  var _showInp=useState(false),showInp=_showInp[0],setShowInp=_showInp[1];
  var _showHint=useState(false),showHint=_showHint[0],setShowHint=_showHint[1];
  var _showExp=useState(false),showExp=_showExp[0],setShowExp=_showExp[1];
  var _clothesDone=useState(saved?!!saved.cd:false),clothesDone=_clothesDone[0],setClDone=_clothesDone[1];
  var _wr=useState(saved?saved.wr||0:0),wr=_wr[0],setWr=_wr[1];
  var _idle=useState(null),idle=_idle[0],setIdle=_idle[1];
  var _gDone=useState(saved?!!saved.gd:false),gDone=_gDone[0],setGDone=_gDone[1];
  var _nUsed=useState(saved?!!saved.nu:false),nUsed=_nUsed[0],setNUsed=_nUsed[1];
  var _cheat=useState(saved?!!saved.cc:false),cheat=_cheat[0],setCheat=_cheat[1];
  var _black=useState(false),black=_black[0],setBlack=_black[1];
  var _flash=useState(false),flash=_flash[0],setFlash=_flash[1];
  var _glitch=useState(false),glitching=_glitch[0],setGlitch=_glitch[1];
  var _ghost=useState(null),ghost=_ghost[0],setGhost=_ghost[1];

  var initDone=useRef(false);
  var pending=useRef(normalizeFind(_find));
  var btm=useRef(null);
  var gsR=useRef(gs);
  var foundR=useRef(found);
  var solvedR=useRef(solved);
  var typR=useRef(false);
  var curR=useRef(cur);
  var idleTmr=useRef(null);
  var idleCnt=useRef(0);
  var idleUsed=useRef([]);
  var lockScroll=useRef(false);

  useEffect(function(){gsR.current=gs},[gs]);
  useEffect(function(){foundR.current=found},[found]);
  useEffect(function(){solvedR.current=solved},[solved]);
  useEffect(function(){typR.current=typing},[typing]);
  useEffect(function(){curR.current=cur},[cur]);

  // PERSIST
  useEffect(function(){
    if(gs==="intro")return;
    save({gs:gs==="puzzle"?"exploring":gs,lines:lines.slice(-60),found:found,solved:solved,hu:hu,th:th,cd:clothesDone,wr:wr,gd:gDone,nu:nUsed,cc:cheat})
  },[gs,lines,found,solved,hu,th,clothesDone,wr,gDone,nUsed,cheat]);

  // SCROLL
  useEffect(function(){
    if(!btm.current||lockScroll.current)return;
    btm.current.scrollIntoView({behavior:"auto",block:"end"});
  },[lines.length,showInp,showExp,black]);

  function startIdle(){stopIdle();idleCnt.current=0;nextIdle()}
  function stopIdle(){if(idleTmr.current){clearTimeout(idleTmr.current);idleTmr.current=null}}
  function pickU(pool){var a=pool.filter(function(l){return idleUsed.current.indexOf(l)===-1});if(!a.length){idleUsed.current=[];a=pool}var p=a[Math.floor(Math.random()*a.length)];idleUsed.current.push(p);return p}
  function nextIdle(){
    var b=idleCnt.current===0?25000:30000;
    var j=Math.random()*(idleCnt.current===0?10000:15000);
    idleTmr.current=setTimeout(function(){
      if(gsR.current!=="exploring")return;
      var pool=idleCnt.current<2?IDLE_E:idleCnt.current<4?IDLE_M:IDLE_L;
      setIdle(pickU(pool));idleCnt.current++;
      setTimeout(function(){setIdle(null);if(gsR.current==="exploring")nextIdle()},8000)
    },b+j)
  }

  function lineDelay(line,mode){
    if(line==="") return mode==="result"?700:600;
    if(mode==="result"){
      if(line==="...") return 700;
      if(line.length<16) return 900;
      return 1150;
    }
    if(mode==="question"){
      if(line==="") return 700;
      if(line.toLowerCase()==="question.") return 650;
      if(line.length<18) return 500;
      return 700;
    }
    if(line==="...") return 500;
    if(line.length<10) return 250;
    if(line.length<22) return 350;
    return 500;
  }

  var type=useCallback(function(arr,cb,mode){
    if(!arr||!arr.length){if(cb)cb();return}
    var i=0;setTyping(true);
    function go(){
      if(i<arr.length){
        var line=arr[i]||"";
        setLines(function(p){return p.concat([line])});
        i++;
        setTimeout(go,lineDelay(line,mode))
      }else{
        setTyping(false);
        if(cb)cb()
      }
    }
    go()
  },[]);

  function goExplore(){setGs("exploring");setShowExp(true);setIdle(null);startIdle()}
  function leaveExplore(){setShowExp(false);setIdle(null);stopIdle()}

  // TAB DETECTION
  useEffect(function(){
    function v(){}
    document.addEventListener("visibilitychange",v);
    return function(){document.removeEventListener("visibilitychange",v)}
  },[]);

  // INIT
  useEffect(function(){
    if(initDone.current)return;
    initDone.current=true;
    var hasProgress=saved&&((saved.solved&&saved.solved.length>0)||(saved.found&&saved.found.length>0));
    if(hasProgress){
      if(pending.current){
        var fid=pending.current;pending.current=null;
        setLines([]);
        type(["you're back.","where were we. right."],function(){
          goExplore();
          setTimeout(function(){doFind(fid)},300)
        },"result")
      }else{
        setLines([]);
        type(["...you're still here. good."],function(){goExplore()},"result")
      }
    }else{
      setTimeout(function(){
        type(INTRO,function(){
          goExplore();
          if(pending.current){
            var id=pending.current;pending.current=null;
            setTimeout(function(){doFind(id)},400)
          }
        },"question")
      },600)
    }
    return function(){stopIdle()}
  },[]);

  // NFC LISTENER
  useEffect(function(){
    function hf(){
      var p=new URLSearchParams(window.location.search);
      var f=p.get("find");
      if(f){
        window.history.replaceState({},"",window.location.pathname);
        var nf=normalizeFind(f);
        if(gsR.current==="exploring"&&!typR.current)doFind(nf);
        else pending.current=nf
      }
    }
    function ps(ev){if(ev.persisted)hf()}
    window.addEventListener("focus",hf);
    window.addEventListener("pageshow",ps);
    return function(){window.removeEventListener("focus",hf);window.removeEventListener("pageshow",ps)}
  },[]);

  function doFind(id){
    leaveExplore();
    if(id==="wrongrock")doWrongRock();
    else if(GC[id])doGeo(id);
    else goExplore()
  }

  function doWrongRock(){
    var idx=Math.min(wr,WRONGROCK.length-1);
    setWr(function(p){return p+1});
    setLines([]);
    type(WRONGROCK[idx],function(){goExplore()},"result")
  }

  function doGlitch(cb){
    setGDone(true);setLines([]);setGlitch(true);
    vib([20,50,20,50,20,100,40]);playTone();
    type(GLITCH,function(){
      setGlitch(false);setBlack(true);
      setTimeout(function(){
        setBlack(false);setLines([]);
        type(["...no.","that's not — ignore that. the old version is still in here somewhere.","it's fine. keep going."],function(){setTimeout(cb,400)},"result")
      },2000)
    },"result")
  }

  function postSolve(count,cb){
    if(count===2){
      type(["by the way.","whoever picked up that thing earlier.","we're still thinking about that."],function(){setTimeout(cb,300)},"result");
      return
    }
    if(!clothesDone&&count===3){setClDone(true);type(CLOTHES,function(){setTimeout(cb,600)},"result");return}
    if(!gDone&&count===4){doGlitch(cb);return}
    if(QUIPS[count]){type(QUIPS[count],function(){setTimeout(cb,300)},"result");return}
    cb()
  }

  function doGeo(id){
    var gc=GC[id];if(!gc)return;

    if(solvedR.current.indexOf(id)!==-1){
      setLines([]);
      type(["you already did this one.","i remember even if you don't."],function(){goExplore()},"result");
      return
    }

    if(curR.current!==null&&curR.current!==id){
      setLines([]);
      type(["finish what you started first."],function(){
        setGs("puzzle");
        var curGc=GC[curR.current];
        type(curGc.puzzle.prompt,function(){setShowInp(true);setShowHint(true)},"question")
      },"result");
      return
    }

    if(foundR.current.indexOf(id)!==-1){
      setLines([]);
      type(["we were in the middle of this one.","let me ask again."],function(){
        setCur(id);setGs("puzzle");
        type(gc.puzzle.prompt,function(){setShowInp(true);setShowHint(true)},"question")
      },"result");
      return
    }

    setFound(function(p){return p.concat([id])});
    var fc=foundR.current.length;
    var isLast=solvedR.current.length===5;
    setLines([]);

    if(isLast){
      type(["so this is the last one."],function(){
        setTimeout(function(){
          type(["let's make it count."],function(){
            setTimeout(function(){
              setCur(id);setGs("puzzle");
              type(gc.puzzle.prompt,function(){setShowInp(true);setShowHint(true)},"question")
            },400)
          },"result")
        },800)
      },"result")
    }else{
      var rt=fc===0?"first":fc<3?"early":"late";
      var rx=gc.reactions[rt].slice();
      if(gDone&&!nUsed&&pName){
        setNUsed(true);
        rx.push("you're doing well, "+pName+".");
      }
      type(rx,function(){
        setTimeout(function(){
          setCur(id);setGs("puzzle");
          type(gc.puzzle.prompt,function(){setShowInp(true);setShowHint(true)},"question")
        },450)
      },"question")
    }
  }

  function submit(){
    if(!cur||!inp.trim())return;
    lockScroll.current=true;
    var gc=GC[cur];var pz=gc.puzzle;var ans=inp.trim();
    setInp("");
    setShowInp(false);
    setShowHint(false);
    setLines(function(p){return p.concat(["> "+ans])});

    var cheatLines=[];

    if(pz.validate(ans)){
      vib([50,30,80]);
      setFlash(true);
      setTimeout(function(){setFlash(false)},300);
      var resp=Array.isArray(pz.correct)?pz.correct:[pz.correct];
      var all=cheatLines.concat(resp);
      setTimeout(function(){
        type(all,function(){
          var ns=solvedR.current.concat([cur]);
          setSolved(ns);
          setCur(null);
          if(ns.length===6){
            setTimeout(function(){lockScroll.current=false;finish()},900)
          }else{
            setTimeout(function(){
              setLines([]);
              postSolve(ns.length,function(){
                lockScroll.current=false;
                goExplore();
                if(pending.current){
                  var id=pending.current;pending.current=null;
                  setTimeout(function(){doFind(id)},300)
                }
              })
            },500)
          }
        },"result")
      },350)
    }else{
      var wr2;
      if(typeof pz.wrong==="function")wr2=pz.wrong(ans);
      else if(Array.isArray(pz.wrong))wr2=pz.wrong;
      else wr2=[pz.wrong];
      var allW=cheatLines.concat(wr2);
      setTimeout(function(){
        type(allW,function(){
          lockScroll.current=false;
          setShowInp(true);
          setShowHint(true)
        },"result")
      },250)
    }
  }

  function hint(){
    if(!cur)return;
    lockScroll.current=true;
    var gc=GC[cur];var c=hu[cur]||0;
    if(c>=gc.puzzle.hints.length){lockScroll.current=false;return}
    var t=gc.puzzle.hints[c];
    setHu(function(p){var n={};for(var k in p)n[k]=p[k];n[cur]=c+1;return n});
    setTh(function(p){return p+1});
    setShowInp(false);setShowHint(false);
    var pre=c===0?["...fine."]:c===1?["this is the part where i try not to be judgmental."]:["we're not going to talk about how many times you've asked."];
    type(pre.concat(["",t]),function(){
      lockScroll.current=false;
      setShowInp(true);
      if(c+1<gc.puzzle.hints.length)setShowHint(true)
    },"result")
  }

  function finish(){
    clear();setLines([]);
    var msgs=th===0?COMPLETE.no:th<=3?COMPLETE.some:COMPLETE.many;
    var final=msgs.concat(["if she asks about the voice, tell her everything worked perfectly."]);
    type(final,function(){
      lockScroll.current=false;
      setGs("complete");
      setTimeout(function(){setGhost("you're still here.")},60000)
    },"result")
  }

  var rem=6-solved.length;

  if(black)return e("div",{style:{minHeight:"100vh",minHeight:"100dvh",backgroundColor:"#0a0a0a"}});

  return e("div",{style:{minHeight:"100vh",minHeight:"100dvh",backgroundColor:flash?"#151515":"#0a0a0a",color:"#c8c8c8",fontFamily:"'Courier New',Courier,monospace",fontSize:"15px",lineHeight:"1.6",padding:"20px 16px",maxWidth:"100%",boxSizing:"border-box",position:"relative",transition:"background-color 0.15s ease"}},
    e("div",{style:{paddingBottom:"20px"}},
      lines.map(function(l,i){
        if(l==null)return null;
        if(l==="---")return e("hr",{key:"l"+i,style:{border:"none",borderTop:"1px solid #1a1a1a",margin:"24px 0"}});
        if(l==="")return e("div",{key:"l"+i,style:{height:"10px"}});
        if(typeof l==="string"&&l.toLowerCase()==="question.")return e("p",{key:"l"+i,style:{margin:0,padding:"2px 0",opacity:0,animation:"fadeIn 0.4s ease forwards",color:"#888",fontSize:"12px",letterSpacing:"2px",textTransform:"uppercase"}},l);
        if(typeof l==="string"&&l.indexOf("> ")===0)return e("p",{key:"l"+i,style:{margin:0,padding:"2px 0",opacity:0,animation:"fadeIn 0.4s ease forwards",color:"#555",fontSize:"14px"}},l);
        if(glitching&&l.indexOf("🎉")!==-1)return e("p",{key:"l"+i,style:{margin:0,padding:"2px 0",opacity:0,animation:"fadeIn 0.4s ease forwards",color:"#4a9",fontSize:"14px",fontStyle:"italic"}},l);
        if(glitching)return e("p",{key:"l"+i,style:{margin:0,padding:"2px 0",opacity:0,animation:"glitchText 0.3s ease infinite, fadeIn 0.4s ease forwards",color:"#884444"}},l);
        return e("p",{key:"l"+i,style:{margin:0,padding:"2px 0",opacity:0,animation:"fadeIn 0.4s ease forwards"}},l)
      }),
      typing?e("span",{style:{display:"inline-block",width:"8px",height:"15px",backgroundColor:"#c8c8c8",marginLeft:"2px",marginTop:"4px",animation:"blink 1s step-end infinite"}}):null,
      ghost?e("p",{style:{margin:0,padding:"2px 0",color:"#333",marginTop:"40px"}},ghost):null
    ),
    showExp&&!typing&&gs==="exploring"&&rem>0?e("div",{style:{opacity:0,animation:"fadeIn 0.6s ease 0.3s forwards"}},
      e(Scanner,{n:rem}),
      idle?e("p",{key:"i-"+idle,style:{textAlign:"center",color:"#444",fontSize:"13px",marginTop:"16px",fontStyle:"italic",opacity:0,animation:"fadeIn 0.6s ease forwards"}},idle)
        :e("p",{style:{textAlign:"center",color:"#2a2a2a",fontSize:"12px",marginTop:"16px",letterSpacing:"1px",animation:"idleFade 4s ease-in-out infinite"}},"scanning")
    ):null,
    showInp&&!typing&&gs==="puzzle"?e("div",{style:{marginTop:"16px",display:"flex",flexDirection:"column",gap:"10px"}},
      e("input",{style:{backgroundColor:"#111",border:"1px solid #333",color:"#c8c8c8",fontFamily:"'Courier New',Courier,monospace",fontSize:"16px",padding:"12px",borderRadius:0,outline:"none",width:"100%",boxSizing:"border-box",WebkitAppearance:"none"},type:"text",value:inp,onChange:function(ev){setInp(ev.target.value)},onKeyDown:function(ev){if(ev.key==="Enter")submit()},placeholder:"...",autoFocus:true,autoComplete:"off",autoCapitalize:"off",spellCheck:false}),
      e("div",{style:{display:"flex",gap:"12px",alignItems:"center"}},
        e("button",{style:{backgroundColor:"transparent",border:"1px solid #444",color:"#888",fontFamily:"'Courier New',Courier,monospace",fontSize:"13px",padding:"10px 20px",cursor:"pointer"},onClick:submit},"submit"),
        showHint?e("button",{style:{backgroundColor:"transparent",border:"1px solid #2a2a2a",color:"#444",fontFamily:"'Courier New',Courier,monospace",fontSize:"12px",padding:"8px 14px",cursor:"pointer"},onClick:hint},"fine. hint."):null)
    ):null,
    !black?e("div",{style:{position:"fixed",bottom:0,left:0,right:0,display:"flex",justifyContent:"center",gap:"12px",padding:"14px 12px",paddingBottom:"max(14px, env(safe-area-inset-bottom))",backgroundColor:"#0a0a0aee",borderTop:"1px solid #111"}},
      KEYS.map(function(id){
        var s=solved.indexOf(id)!==-1;var f=found.indexOf(id)!==-1;
        return e("div",{key:id,style:{width:"8px",height:"8px",borderRadius:"50%",backgroundColor:s?"#c8c8c8":f?"#444":"#1a1a1a",transition:"all 0.4s ease",animation:s?"pulseDot 0.6s ease":"none"}})
      })
    ):null,
    e("div",{ref:btm,style:{height:"80px"}}))
}

ReactDOM.render(e(App),document.getElementById("root"));
})();
</script>
